<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안티그래비티 스도쿠</title>
    <meta name="description" content="모던하고 깔끔한 프리미엄 스도쿠 웹앱">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="logo">
                <h1>Sudoku</h1>
                <span class="badge">by Anti-gravity</span>
            </div>
            <div class="controls">
                <button id="btn-theme" class="btn icon-btn" title="테마 변경">
                    <!-- Moon Icon (for dark theme) -->
                    <svg id="theme-icon-moon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <!-- Sun Icon (for light theme) -->
                    <svg id="theme-icon-sun" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" style="display: none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>
                <select id="difficulty" class="glass-select">
                    <option value="easy">초급</option>
                    <option value="medium" selected>중급</option>
                    <option value="hard">고급</option>
                    <option value="expert">전문가</option>
                </select>
                <button id="btn-new-game" class="btn primary">새 게임</button>
            </div>
        </header>

        <section class="status-bar glass-panel">
            <div class="status-item">
                <span class="label">난이도</span>
                <span id="display-difficulty" class="value">중급</span>
            </div>
            <div class="status-item">
                <span class="label">실수</span>
                <span id="display-mistakes" class="value">0 / 3</span>
            </div>
            <div class="status-item">
                <span class="label">시간</span>
                <span id="display-timer" class="value timer">00:00</span>
            </div>
        </section>

        <main class="main-content">
            <div class="board-container">
                <div id="sudoku-board" class="sudoku-board">
                    <!-- JS generated cells will go here -->
                </div>
            </div>

            <div class="interaction-panel">
                <div class="tools">
                    <button class="tool-btn" id="btn-undo" title="실행 취소">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
                        <span>되돌리기</span>
                    </button>
                    <button class="tool-btn" id="btn-erase" title="지우기">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M20 5H9l-7 7 7 7h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
                        <span>지우기</span>
                    </button>
                    <button class="tool-btn" id="btn-memo" title="메모 모드 토글">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                        <span id="label-memo">메모: 끄기</span>
                    </button>
                    <button class="tool-btn" id="btn-hint" title="힌트">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                        <span>힌트</span>
                    </button>
                </div>
                
                <div class="numpad" id="numpad">
                    <button class="num-btn" data-val="1">1</button>
                    <button class="num-btn" data-val="2">2</button>
                    <button class="num-btn" data-val="3">3</button>
                    <button class="num-btn" data-val="4">4</button>
                    <button class="num-btn" data-val="5">5</button>
                    <button class="num-btn" data-val="6">6</button>
                    <button class="num-btn" data-val="7">7</button>
                    <button class="num-btn" data-val="8">8</button>
                    <button class="num-btn" data-val="9">9</button>
                </div>
            </div>
        </main>
    </div>
    <script src="sudoku.js"></script>
    <script src="app.js"></script>
</body>
</html>
